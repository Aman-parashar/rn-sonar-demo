name : React Native CI


on: 
 push:
   branches:
     - main

jobs:
 build:
  runs-on: ubuntu-latest

  steps:
   - name: Checkout Repositary
     uses: actions/checkout@v4

   - name: Setup Nodejs
     uses: actions/setup-node@v5
     with:
      node-version: 22
 
   - name: Install Dependencies
     run: npm install

   - name: Linting Check
     run: npm run lint

   - name: SonarCloud Scan
     uses: SonarSource/sonarcloud-github-action@v8
     env: 
      SONAR_TOKAN: ${{ secrets.SONAR_TOKEN }}

   - name: Show current directory
     run: pwd

   - name: List Repositary files
     run: ls -la 

